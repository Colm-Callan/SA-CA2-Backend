# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - SACA2DEPLOY

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore SACA2/SACA2/SACA2.csproj

      - name: Build with dotnet
        run: dotnet build SACA2/SACA2/SACA2.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish SACA2/SACA2/SACA2.csproj -c Release -o ./myapp

      - name: Run EF Core migrations
        run: |
          cd SACA2/SACA2
          dotnet ef database update --configuration Release
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./myapp
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BCCBC04A86364003AEDEB312D420015B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DCFBA21C48084986ADAE237BB651CC60 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C1329CC63B0D44EABAD699971607C0F1 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SACA2DEPLOY'
          slot-name: 'Production'
          package: ./myapp
